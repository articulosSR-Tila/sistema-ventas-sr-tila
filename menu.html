<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Principal | Artículos Religiosos Sr. de Tila</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #eef2f7 0%, #d9e2ec 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .menu-container {
            background-color: #ffffff;
            padding: 50px 45px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            width: 100%;
            max-width: 850px; 
            border-top: 5px solid #1a365d;
        }

        .encabezado-control {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 35px;
            border-bottom: 1px solid #e4e7eb;
            padding-bottom: 20px;
        }

        .texto-bienvenida {
            text-align: left;
        }

        .texto-bienvenida span {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #7b8794;
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
        }

        .texto-bienvenida h1 {
            margin: 0; 
            color: #1a365d; 
            font-size: 24px;
            font-weight: 700;
        }

        .options-grid {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap; 
            margin-top: 10px;
        }

        .option-card {
            background-color: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 40px 20px;
            width: 29%; 
            min-width: 200px;
            cursor: pointer;
            text-decoration: none;
            color: #334e68;
            transition: all 0.3s ease;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .option-card:hover {
            border-color: #1a365d;
            background-color: #ffffff;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(26, 54, 93, 0.08);
        }

        .option-icon {
            font-size: 46px;
            margin-bottom: 18px;
            transition: transform 0.3s ease;
        }

        .option-title {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.4;
            text-align: center;
        }
        
        .btn-logout {
            background-color: transparent;
            color: #627d98;
            border: 1px solid #cbd5e1;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }
        
        .btn-logout:hover {
            background-color: #dc3545;
            color: white;
            border-color: #dc3545;
            box-shadow: 0 4px 10px rgba(220, 53, 69, 0.2);
        }

        #pantallaCarga {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: #1a365d;
            font-weight: 600;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>

    <div id="pantallaCarga">Verificando permisos...</div>

    <div class="menu-container">
        <div class="encabezado-control">
            <div class="texto-bienvenida">
                <span>¡Bienvenido!</span>
                <h1>Selecciona un módulo para continuar</h1>
            </div>
            <button id="btnLogout" class="btn-logout">Cerrar Sesión</button>
        </div>
        
        <div class="options-grid">
            <!-- Módulo protegido para el Administrador -->
            <a href="inventario.html" class="option-card" id="modulo-control-existencias">
                <div class="option-icon">📦</div>
                <div class="option-title">Control de Existencias</div>
            </a>
            
            <!-- Módulo accesible para empleados y administrador -->
            <a href="verificador.html" class="option-card" id="modulo-verificador">
                <div class="option-icon">🔍</div>
                <div class="option-title">Verificador de precios y existencias</div>
            </a>
            
            <!-- Módulo accesible para empleados y administrador -->
            <a href="punto_venta.html" class="option-card" id="modulo-punto-venta">
                <div class="option-icon">🛒</div>
                <div class="option-title">Punto de venta</div>
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDhXLz6mqKXPsWD5AQmSnYhq0d3GgATxmw",
            authDomain: "articulos-sr-tila.firebaseapp.com",
            projectId: "articulos-sr-tila",
            storageBucket: "articulos-sr-tila.firebasestorage.app",
            messagingSenderId: "563648337869",
            appId: "1:563648337869:web:f63b0ec1081ecde06d9684",
            measurementId: "G-EH8ZM97MRR"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "index.html";
            } else {
                try {
                    const userDocRef = doc(db, "usuarios", user.uid);
                    const userDocSnap = await getDoc(userDocRef);

                    if (userDocSnap.exists()) {
                        const datosUsuario = userDocSnap.data();
                        const rol = datosUsuario.rol;

                        // Si el rol es vendedor, se remueve únicamente el Control de Existencias
                        if (rol === "vendedor") {
                            const tarjetaExistencias = document.getElementById('modulo-control-existencias');
                            if (tarjetaExistencias) {
                                tarjetaExistencias.remove(); 
                            }
                            console.log("Acceso de empleado: Modulo Control de Existencias restringido.");
                        } else {
                            console.log("Acceso total de administrador habilitado.");
                        }
                    } else {
                        console.warn("No se encontró el perfil del usuario. Restringiendo accesos por seguridad.");
                        document.getElementById('modulo-control-existencias').remove();
                    }
                } catch (error) {
                    console.error("Error al validar el rol:", error);
                } finally {
                    const pantallaCarga = document.getElementById('pantallaCarga');
                    if (pantallaCarga) {
                        pantallaCarga.style.opacity = '0';
                        setTimeout(() => pantallaCarga.remove(), 300);
                    }
                }
            }
        });

        document.getElementById('btnLogout').addEventListener('click', () => {
            if(confirm("¿Estás seguro de que deseas salir del sistema?")) {
                signOut(auth).catch((error) => {
                    console.error("Error al cerrar sesión:", error);
                });
            }
        });
    </script>
</body>
</html>
